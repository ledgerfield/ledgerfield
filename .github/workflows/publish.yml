name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump version in pyproject.toml
        run: sed -i "s/^version = .*/version = \"${{ inputs.version }}\"/" pyproject.toml

      - name: Copy top-level rulesets into package
        run: |
          mkdir -p src/ledgerfield/rulesets
          cp rulesets/*.json src/ledgerfield/rulesets/

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Verify package contents
        run: |
          pip install check-wheel-contents
          check-wheel-contents dist/*.whl
          python -m zipfile -l dist/*.whl | grep rulesets

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
